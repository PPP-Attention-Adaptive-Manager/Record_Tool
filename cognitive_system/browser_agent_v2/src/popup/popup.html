<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cognitive Collector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="card">
    <header class="header">
      <h1>Cognitive Collector</h1>
      <span id="connection-indicator" class="connection offline">offline</span>
    </header>

    <section class="grid">
      <div class="label">Session State</div>
      <div id="session-state" class="value">inactive</div>

      <div class="label">Session ID</div>
      <div id="session-id" class="value mono">-</div>

      <div class="label">Mode</div>
      <div id="mode" class="value">-</div>

      <div class="label">Elapsed</div>
      <div id="elapsed" class="value mono">00:00</div>

      <div class="label">Remaining</div>
      <div id="remaining" class="value mono">00:00</div>

      <div class="label">Browser Recording</div>
      <div id="recording-active" class="value">inactive</div>
    </section>

    <footer class="footer">
      <div class="label">Device</div>
      <div id="device-id" class="value mono">-</div>
    </footer>
  </main>

  <script src="popup.js" type="module"></script>
</body>
</html>
