<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Behavior Collector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>
    <span class="dot" id="state-dot"></span>
    Behavior Collector
  </h1>

  <!-- Active session status -->
  <div id="status-panel">
    <div class="row">
      <span>State</span>
      <span class="val" id="status-state">—</span>
    </div>
    <div class="row">
      <span>Session ID</span>
      <span class="val" id="status-sid">—</span>
    </div>
    <div class="row">
      <span>Time remaining</span>
      <span class="val" id="status-time">—</span>
    </div>
  </div>

  <!-- Start form (hidden while session running) -->
  <div id="start-form">
    <div class="form-group">
      <label for="inp-duration">Session duration (minutes)</label>
      <input type="number" id="inp-duration" min="1" max="180" value="30" placeholder="30">
    </div>

    <div class="form-group">
      <label for="inp-uid">Participant ID (optional)</label>
      <input type="text" id="inp-uid" placeholder="e.g. P001">
    </div>

    <button class="btn btn-start" id="btn-start">Start Session</button>
  </div>

  <!-- Stop button (shown while session running) -->
  <button class="btn btn-stop" id="btn-stop" style="display:none;">
    Stop Session
  </button>

  <div id="error-msg"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
