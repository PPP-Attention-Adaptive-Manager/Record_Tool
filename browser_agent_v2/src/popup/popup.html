<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Behavior Collector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>
    <span class="dot" id="state-dot"></span>
    Behavior Collector
  </h1>

  <div id="status-panel">
    <div class="notice" id="core-notice"></div>
    <div class="row">
      <span>State</span>
      <span class="val" id="status-state">-</span>
    </div>
    <div class="row">
      <span>Session ID</span>
      <span class="val" id="status-sid">-</span>
    </div>
    <div class="row">
      <span>Time remaining</span>
      <span class="val" id="status-time">-</span>
    </div>
    <div class="row">
      <span>Core link</span>
      <span class="val" id="status-conn">idle</span>
    </div>
    <div class="row">
      <span>Queued events</span>
      <span class="val" id="status-queue">0</span>
    </div>
  </div>

  <div id="start-form">
    <div class="form-group">
      <label for="inp-duration">Session duration (minutes)</label>
      <input type="number" id="inp-duration" min="1" max="180" value="30" placeholder="30">
    </div>

    <div class="form-group">
      <label for="inp-uid">Participant ID</label>
      <input type="text" id="inp-uid" placeholder="e.g. P001">
    </div>

    <div class="form-group checkbox-row">
      <label for="inp-enable-influx">Enable InfluxDB mirror on the core if configured</label>
      <input type="checkbox" id="inp-enable-influx">
    </div>

    <button class="btn btn-start" id="btn-start">Start Session</button>
  </div>

  <button class="btn btn-stop" id="btn-stop" style="display:none;">Stop Session</button>
  <button class="btn btn-quit" id="btn-quit-core">Quit Core</button>
  <div id="quit-hint"></div>

  <div id="error-msg"></div>

  <div id="settings-toggle">
    <button class="btn-link" id="btn-toggle-settings">Core settings</button>
  </div>

  <div id="settings-panel" style="display:none;">
    <div class="settings-header">Core Connection</div>

    <div class="form-group">
      <label for="cfg-url">Core URL</label>
      <input type="text" id="cfg-url" placeholder="http://localhost:8765">
    </div>

    <button class="btn btn-save" id="btn-save-cfg">Save</button>
    <div id="cfg-saved-msg" style="display:none;">Saved</div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
